<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Galaxia - Para Você</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Container do Canvas 3D */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Interface do Usuário (Cards) */
        .ui-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .card {
            background: rgba(15, 2, 8, 0.75);
            border: 2px solid #ff1493;
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.6);
            border-radius: 20px;
            padding: 30px;
            width: 340px;
            text-align: center;
            color: #fff;
            backdrop-filter: blur(8px);
            pointer-events: auto;
            transition: all 0.5s ease;
            display: none;
        }

        .card.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .card h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ff69b4;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
        }

        .illustration {
            width: 120px;
            height: 120px;
            margin: 15px auto;
        }

        .card p {
            font-size: 0.95rem;
            color: #ffb6c1;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .btn {
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.7);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-container">
        <div class="card active" id="card-1">
            <h1>Minha Galaxia</h1>
            <div class="illustration">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <circle cx="35" cy="50" r="18" fill="#fff" />
                    <circle cx="25" cy="32" r="6" fill="#fff" />
                    <circle cx="65" cy="53" r="16" fill="#ffe0e9" />
                    <circle cx="73" cy="38" r="5" fill="#ffe0e9" />
                    <path d="M 42 45 Q 50 35 58 45 Q 50 60 42 45" fill="#ff1493" />
                    <circle cx="30" cy="46" r="2" fill="#000" />
                    <circle cx="62" cy="50" r="2" fill="#000" />
                </svg>
            </div>
            <p>LOVE</p>
            <button class="btn" onclick="changeCard(1, 2)">Iniciar</button>
        </div>

        <div class="card" id="card-2">
            <h1>Amor da minha Vida</h1>
            <div class="illustration">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <circle cx="50" cy="50" r="25" fill="#e60000" />
                    <ellipse cx="40" cy="50" rx="4" ry="8" fill="#fff" stroke="#000" stroke-width="2"/>
                    <ellipse cx="60" cy="50" rx="4" ry="8" fill="#fff" stroke="#000" stroke-width="2"/>
                    <path d="M 50 25 L 50 75 M 25 50 L 75 50 M 32 32 L 68 68 M 32 68 L 68 32" stroke="#000" stroke-width="1" />
                    <path d="M 65 25 L 80 15 L 75 30 Z" fill="#fff" stroke="#000" />
                </svg>
            </div>
            <p>Quanto mais tempo passamos juntos, mais eu te amo.</p>
            <button class="btn" onclick="changeCard(2, 3)">Continuar ♥</button>
        </div>

        <div class="card" id="card-3">
            <h1>Você me encanta</h1>
            <div class="illustration">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <path d="M 50 30 C 20 0, 0 40, 50 85 C 100 40, 80 0, 50 30" fill="#ff1493" />
                    <circle cx="40" cy="42" r="3" fill="#fff"/>
                    <circle cx="60" cy="42" r="3" fill="#fff"/>
                    <path d="M 45 52 Q 50 57 55 52" stroke="#fff" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <p>Se eu pudesse escolher um lugar seguro, com certeza seria ao seu lado</p>
            <button class="btn" onclick="closeCards(3)">Venha ver o meu Universo ♥</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- Controle da Interface ---
        function changeCard(current, next) {
            document.getElementById(`card-${current}`).classList.remove('active');
            document.getElementById(`card-${next}`).classList.add('active');
        }

        // Esconde o último card para liberar a visão total do cenário 3D
        function closeCards(current) {
            document.getElementById(`card-${current}`).classList.remove('active');
        }

        // --- Configuração da Galáxia 3D com Three.js ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // --- Criação das Partículas ---
        const particleCount = 4000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorPink = new THREE.Color('#ff1493');
        const colorPurple = new THREE.Color('#4b0082');
        const colorWhite = new THREE.Color('#ffffff');

        for (let i = 0; i < particleCount; i++) {
            const r = Math.pow(Math.random(), 2) * 40 + 3; 
            const theta = Math.random() * Math.PI * 2 + (r * 0.15); 
            const y = (Math.random() - 0.5) * (4 / (r * 0.1 + 1)); 

            const x = Math.cos(theta) * r;
            const z = Math.sin(theta) * r;

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            let mixedColor = colorPink.clone();
            if (r < 8) {
                mixedColor.lerp(colorWhite, 1 - (r/8));
            } else {
                mixedColor.lerp(colorPurple, (r-8)/35);
            }

            colors[i * 3] = mixedColor.r;
            colors[i * 3 + 1] = mixedColor.g;
            colors[i * 3 + 2] = mixedColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const canvasParticle = document.createElement('canvas');
        canvasParticle.width = 16;
        canvasParticle.height = 16;
        const ctx = canvasParticle.getContext('2d');
        const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 16, 16);
        const particleTexture = new THREE.CanvasTexture(canvasParticle);

        const material = new THREE.PointsMaterial({
            size: 0.4,
            map: particleTexture,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        const galaxy = new THREE.Points(geometry, material);
        scene.add(galaxy);

        // --- Coração Central ---
        const heartGeometry = new THREE.BufferGeometry();
        const heartCount = 600;
        const heartPositions = new Float32Array(heartCount * 3);

        for(let i=0; i<heartCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3) * 0.4;
            const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 0.4;
            const z = (Math.random() - 0.5) * 2;

            heartPositions[i*3] = x;
            heartPositions[i*3+1] = y + 5; 
            heartPositions[i*3+2] = z;
        }
        heartGeometry.setAttribute('position', new THREE.BufferAttribute(heartPositions, 3));
        const heartMaterial = new THREE.PointsMaterial({
            size: 0.5,
            color: 0xff0055,
            map: particleTexture,
            blending: THREE.AdditiveBlending,
            transparent: true
        });
        const centerHeart = new THREE.Points(heartGeometry, heartMaterial);
        scene.add(centerHeart);

        // --- Textos Orbitando ---
        const frases = ["TE AMO", "INFINITO ∞", "AMOR ETERNO", "AMOR DE MI VIDA", "ERES MI TODO", "ME ENCANTAS"];
        const textMeshes = [];

        frases.forEach((texto, index) => {
            const textCanvas = document.createElement('canvas');
            textCanvas.width = 256;
            textCanvas.height = 64;
            const tCtx = textCanvas.getContext('2d');
            tCtx.fillStyle = 'rgba(0,0,0,0)';
            tCtx.fillRect(0, 0, 256, 64);
            tCtx.font = 'Bold 24px Arial';
            tCtx.fillStyle = '#ffffff';
            tCtx.shadowColor = '#ff1493';
            tCtx.shadowBlur = 10;
            tCtx.textAlign = 'center';
            tCtx.fillText(texto, 128, 40);

            const textTex = new THREE.CanvasTexture(textCanvas);
            const textMat = new THREE.MeshBasicMaterial({ map: textTex, transparent: true, side: THREE.DoubleSide });
            const textGeo = new THREE.PlaneGeometry(8, 2);
            const mesh = new THREE.Mesh(textGeo, textMat);

            const angle = (index / frases.length) * Math.PI * 2;
            mesh.userData = {
                angle: angle,
                radius: 18 + Math.random() * 5,
                speed: 0.005 + Math.random() * 0.005,
                yPos: 1 + (Math.random() - 0.5) * 3
            };

            scene.add(mesh);
            textMeshes.push(mesh);
        });

        // --- Animação ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            galaxy.rotation.y = time * 0.05;
            
            const pulse = 1 + Math.sin(time * 4) * 0.08;
            centerHeart.scale.set(pulse, pulse, pulse);
            centerHeart.rotation.y = time * 0.2;

            textMeshes.forEach(mesh => {
                mesh.userData.angle += mesh.userData.speed;
                mesh.position.x = Math.cos(mesh.userData.angle) * mesh.userData.radius;
                mesh.position.z = Math.sin(mesh.userData.angle) * mesh.userData.radius;
                mesh.position.y = mesh.userData.yPos + Math.sin(time + mesh.userData.radius) * 0.5;
                mesh.lookAt(camera.position);
            });

            camera.position.x = Math.sin(time * 0.2) * 5;
            camera.lookAt(0, 2, 0);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
