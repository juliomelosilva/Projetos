<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Love - Nosso Universo 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
        }
        #canvas-container:active {
            cursor: grabbing;
        }

        /* Container de Interfaces */
        .ui-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .card {
            background: rgba(15, 2, 8, 0.85);
            border: 2px solid #ff1493;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.6);
            border-radius: 20px;
            padding: 25px;
            width: 350px;
            text-align: center;
            color: #fff;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
            position: absolute;
        }

        .card.active {
            display: block;
            animation: popIn 0.4s ease-out;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.7); }
            to { opacity: 1; transform: scale(1); }
        }

        .card h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #ff69b4;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
        }

        .illustration {
            width: 110px;
            height: 110px;
            margin: 10px auto;
        }

        /* Novo estilo para os Cards de Memórias (com foto) */
        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 20, 147, 0.3);
        }

        .card-date {
            font-size: 0.8rem;
            color: #ff69b4;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card p {
            font-size: 0.95rem;
            color: #ffb6c1;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .btn {
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            border: none;
            color: white;
            padding: 10px 25px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.7);
        }

        /* Dica flutuante que aparece após os cards iniciais */
        #hint-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 182, 193, 0.7);
            font-size: 0.85rem;
            z-index: 5;
            pointer-events: none;
            text-align: center;
            animation: pulse 2s infinite;
            display: none;
            text-shadow: 0 0 5px #000;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="hint-overlay">✨ Arraste a tela para girar em 3D • Clique nos nomes orbitantes ✨</div>

    <div class="ui-container">
        <div class="card active" id="card-1">
            <h1>Galaxy Love</h1>
            <div class="illustration">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <circle cx="35" cy="50" r="18" fill="#fff" />
                    <circle cx="25" cy="32" r="6" fill="#fff" />
                    <circle cx="65" cy="53" r="16" fill="#ffe0e9" />
                    <circle cx="73" cy="38" r="5" fill="#ffe0e9" />
                    <path d="M 42 45 Q 50 35 58 45 Q 50 60 42 45" fill="#ff1493" />
                    <circle cx="30" cy="46" r="2" fill="#000" />
                    <circle cx="62" cy="50" r="2" fill="#000" />
                </svg>
            </div>
            <p>LOVE</p>
            <button class="btn" onclick="changeCard(1, 2)">Iniciar</button>
        </div>

        <div class="card" id="card-2">
            <h1>Amor de mi Vida</h1>
            <div class="illustration">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <circle cx="50" cy="50" r="25" fill="#e60000" />
                    <ellipse cx="40" cy="50" rx="4" ry="8" fill="#fff" stroke="#000" stroke-width="2"/>
                    <ellipse cx="60" cy="50" rx="4" ry="8" fill="#fff" stroke="#000" stroke-width="2"/>
                    <path d="M 50 25 L 50 75 M 25 50 L 75 50 M 32 32 L 68 68 M 32 68 L 68 32" stroke="#000" stroke-width="1" />
                    <path d="M 65 25 L 80 15 L 75 30 Z" fill="#fff" stroke="#000" />
                </svg>
            </div>
            <p>Cuanto más tiempo estamos juntos, más te amo.</p>
            <button class="btn" onclick="changeCard(2, 3)">Continuar ♥</button>
        </div>

        <div class="card" id="card-3">
            <h1>Me Encantas</h1>
            <div class="illustration">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <path d="M 50 30 C 20 0, 0 40, 50 85 C 100 40, 80 0, 50 30" fill="#ff1493" />
                    <circle cx="40" cy="42" r="3" fill="#fff"/>
                    <circle cx="60" cy="42" r="3" fill="#fff"/>
                    <path d="M 45 52 Q 50 57 55 52" stroke="#fff" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <p>Si pudiera elegir un lugar seguro, sería a tu lado.</p>
            <button class="btn" onclick="closeInitialCards(3)">Explorar Universo ♥</button>
        </div>

        <div class="card" id="memory-card">
            <h1 id="mem-title">Título</h1>
            <div class="card-date" id="mem-date">00/00/2026</div>
            <img src="" alt="Nossa Foto" class="card-img" id="mem-img">
            <p id="mem-text">Texto descritivo aqui.</p>
            <button class="btn" onclick="closeMemoryCard()">Fechar e Voltar</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- BANCO DE DADOS DOS CARDS CLICÁVEIS ---
        // Você pode alterar os textos, datas e URLs das imagens aqui à vontade!
        const dadosMemorias = {
            "TE AMO": {
                titulo: "Meu Porto Seguro",
                data: "12 de Outubro",
                texto: "Você é a melhor parte dos meus dias e o motivo dos meus sorrisos mais sinceros.",
                foto: "https://picsum.photos/id/1004/400/300" 
            },
            "INFINITO ∞": {
                titulo: "Além do Tempo",
                data: "Nosso Futuro",
                texto: "O que eu sinto por você não cabe em vidas inteiras, cruza qualquer galáxia.",
                foto: "https://picsum.photos/id/1029/400/300"
            },
            "AMOR ETERNO": {
                titulo: "Promessa Invisível",
                data: "Para Sempre",
                texto: "Construímos um universo todinho nosso, onde o tempo simplesmente não dita as regras.",
                foto: "https://picsum.photos/id/1043/400/300"
            },
            "AMOR DE MI VIDA": {
                titulo: "O Grande Encontro",
                data: "O Dia que te vi",
                texto: "Minha vida ganhou cores muito mais vibrantes e reais a partir do segundo em que você chegou.",
                foto: "https://picsum.photos/id/1057/400/300"
            },
            "ERES MI TODO": {
                titulo: "Meu Lar",
                data: "Todos os Dias",
                texto: "Em meio a todo o caos do mundo, você continua sendo o meu único e melhor abrigo.",
                foto: "https://picsum.photos/id/1062/400/300"
            },
            "ME ENCANTAS": {
                titulo: "Seu Brilho Único",
                data: "Instantes Felizes",
                texto: "Seu jeito, sua risada e o calor do seu abraço me fascinam e me prendem a você a cada dia mais.",
                foto: "https://picsum.photos/id/1081/400/300"
            }
        };

        // --- CONTROLE DOS CARDS (INTERFACE) ---
        let initialCardsActive = true;

        function changeCard(current, next) {
            document.getElementById(`card-${current}`).classList.remove('active');
            document.getElementById(`card-${next}`).classList.add('active');
        }

        function closeInitialCards(current) {
            document.getElementById(`card-${current}`).classList.remove('active');
            initialCardsActive = false;
            document.getElementById('hint-overlay').style.display = 'block';
            // Libera o controle 3D completo do mouse/touch
            controls.enabled = true; 
        }

        function openMemoryCard(palavra) {
            if (initialCardsActive) return; // Não abre se estiver nas mensagens iniciais
            
            const dados = dadosMemorias[palavra];
            if (!dados) return;

            document.getElementById('mem-title').innerText = dados.titulo;
            document.getElementById('mem-date').innerText = dados.data;
            document.getElementById('mem-text').innerText = dados.texto;
            document.getElementById('mem-img').src = dados.foto;

            document.getElementById('memory-card').classList.add('active');
            controls.enabled = false; // Trava o fundo enquanto lê o card
        }

        function closeMemoryCard() {
            document.getElementById('memory-card').classList.remove('active');
            if(!initialCardsActive) controls.enabled = true; // Devolve controle ao fundo 3D
        }


        // --- CENÁRIO 3D GRAPHICS (THREE.JS) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 45);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // NATIVO DO ARRASTE 3D: OrbitControls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 80;
        controls.minDistance = 15;
        controls.enabled = false; // Começa desativado para não atrapalhar os cliques iniciais

        // --- SISTEMA DE PARTÍCULAS (GALÁXIA) ---
        const particleCount = 4500;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorPink = new THREE.Color('#ff1493');
        const colorPurple = new THREE.Color('#4b0082');
        const colorWhite = new THREE.Color('#ffffff');

        for (let i = 0; i < particleCount; i++) {
            const r = Math.pow(Math.random(), 2) * 45 + 3; 
            const theta = Math.random() * Math.PI * 2 + (r * 0.14); 
            const y = (Math.random() - 0.5) * (4.5 / (r * 0.1 + 1)); 

            positions[i * 3] = Math.cos(theta) * r;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = Math.sin(theta) * r;

            let mixedColor = colorPink.clone();
            if (r < 9) {
                mixedColor.lerp(colorWhite, 1 - (r/9));
            } else {
                mixedColor.lerp(colorPurple, (r-9)/36);
            }
            colors[i * 3] = mixedColor.r;
            colors[i * 3 + 1] = mixedColor.g;
            colors[i * 3 + 2] = mixedColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Textura suave circular para as esferas
        const canvasParticle = document.createElement('canvas');
        canvasParticle.width = 16; canvasParticle.height = 16;
        const ctx = canvasParticle.getContext('2d');
        const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
        grad.addColorStop(0, 'rgba(255,255,255,1)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, 16, 16);
        const texture = new THREE.CanvasTexture(canvasParticle);

        const material = new THREE.PointsMaterial({
            size: 0.35, map: texture, vertexColors: true,
            blending: THREE.AdditiveBlending, depthWrite: false, transparent: true
        });
        const galaxy = new THREE.Points(geometry, material);
        scene.add(galaxy);

        // --- CORAÇÃO CENTRAL ---
        const heartGeometry = new THREE.BufferGeometry();
        const heartCount = 700;
        const heartPositions = new Float32Array(heartCount * 3);

        for(let i=0; i<heartCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3) * 0.35;
            const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 0.35;
            const z = (Math.random() - 0.5) * 2.5;
            heartPositions[i*3] = x;
            heartPositions[i*3+1] = y + 3;
            heartPositions[i*3+2] = z;
        }
        heartGeometry.setAttribute('position', new THREE.BufferAttribute(heartPositions, 3));
        const heartMat = new THREE.PointsMaterial({ size: 0.45, color: 0xff0055, map: texture, blending: THREE.AdditiveBlending, transparent: true });
        const centerHeart = new THREE.Points(heartGeometry, heartMat);
        scene.add(centerHeart);


        // --- TEXTOS INTERATIVOS ORBITANTES (PLACAS CLICÁVEIS) ---
        const frases = Object.keys(dadosMemorias);
        const textMeshes = [];

        frases.forEach((texto, index) => {
            const textCanvas = document.createElement('canvas');
            textCanvas.width = 256; textCanvas.height = 64;
            const tCtx = textCanvas.getContext('2d');
            tCtx.font = 'Bold 26px Arial';
            tCtx.fillStyle = '#ffffff';
            tCtx.shadowColor = '#ff1493'; tCtx.shadowBlur = 12;
            tCtx.textAlign = 'center';
            tCtx.fillText(texto, 128, 42);

            const textTex = new THREE.CanvasTexture(textCanvas);
            const textMat = new THREE.MeshBasicMaterial({ map: textTex, transparent: true, side: THREE.DoubleSide });
            const textGeo = new THREE.PlaneGeometry(7.5, 1.875);
            const mesh = new THREE.Mesh(textGeo, textMat);

            const angle = (index / frases.length) * Math.PI * 2;
            mesh.userData = {
                name: texto,
                angle: angle,
                radius: 17 + Math.random() * 4,
                speed: 0.004 + Math.random() * 0.004,
                yPos: 1 + (Math.random() - 0.5) * 4
            };

            scene.add(mesh);
            textMeshes.push(mesh);
        });


        // --- DETECÇÃO DE CLIQUES EM ELEMENTOS 3D (RAYCASTER) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            // Ignora cliques se os cards HTML centrais estiverem abertos bloqueando a tela
            if (initialCardsActive || document.getElementById('memory-card').classList.contains('active')) return;

            // Normaliza coordenadas do mouse
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(textMeshes);

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                openMemoryCard(clickedMesh.userData.name);
            }
        });

        // Efeito Visual de Hover (Mudar o cursor do mouse sobre as palavras)
        window.addEventListener('mousemove', (event) => {
            if (initialCardsActive) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(textMeshes);
            
            if (intersects.length > 0 && !document.getElementById('memory-card').classList.contains('active')) {
                document.body.style.cursor = 'pointer';
            } else {
                document.body.style.cursor = 'default';
            }
        });


        // --- ENGINE DE ANIMAÇÃO EM TEMPO REAL ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Movimento automático da galáxia
            galaxy.rotation.y = time * 0.03;
            
            // Pulsação Orgânica do Coração
            const pulse = 1 + Math.sin(time * 3.5) * 0.07;
            centerHeart.scale.set(pulse, pulse, pulse);
            centerHeart.rotation.y = time * 0.15;

            // Rotação orbital das palavras
            textMeshes.forEach(mesh => {
                mesh.userData.angle += mesh.userData.speed;
                mesh.position.x = Math.cos(mesh.userData.angle) * mesh.userData.radius;
                mesh.position.z = Math.sin(mesh.userData.angle) * mesh.userData.radius;
                mesh.position.y = mesh.userData.yPos + Math.sin(time + mesh.userData.radius) * 0.4;
                
                // Força os planos texturizados a sempre olharem para a câmera de qualquer ângulo
                mesh.lookAt(camera.position);
            });

            // Atualiza os controles físicos de órbita do mouse (OrbitControls)
            if (controls.enabled) {
                controls.update();
            } else if (initialCardsActive) {
                // Efeito de câmera cinematográfica inicial flutuante
                camera.position.x = Math.sin(time * 0.15) * 6;
                camera.lookAt(0, 1, 0);
            }

            renderer.render(scene, camera);
        }

        animate();

        // Responsividade ao redimensionar tela
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
